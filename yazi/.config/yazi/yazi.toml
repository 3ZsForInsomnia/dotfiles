[mgr]
show_hidden = true
sort_by = "natural"
linemode = "size"

[plugin]
prepend_previewers = [
  { name = "*.md", run = "glow" },
]

[[plugin.prepend_fetchers]]
id   = "git"
name = "*"
run  = "git"

[[plugin.prepend_fetchers]]
id   = "git"
name = "*/"
run  = "git"

# Example of piper for piping anything through to Yazi
[[plugin.prepend_previewers]]
url = "*.tar*"
run = 'piper --format=url -- tar tf "$1"'
